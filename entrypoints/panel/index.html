<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="status" class="status" style="display: none;"></div>

    <div id="mainView" class="main-view">

            <h1>Porsche Design System Analyzer</h1>
            <p>v<span id="extVersion"></span> · DS Compliance Check für Web-Komponenten</p>

        <button id="analyzeBtn" class="analyze-btn">Website analysieren</button>

        <div id="tabContainer" class="tab-container" style="display: none;">
            <div class="tab-bar">
                <button class="tab-btn active" data-tab="pds">PDS Komponenten</button>
                <button class="tab-btn" data-tab="custom">Custom Elemente</button>
            </div>
            <div id="tabContent" class="tab-content"></div>

    <script type="module" src="./main.ts"></script>
